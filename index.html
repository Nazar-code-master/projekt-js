<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container">
            <p class="h1">Ocean Research Station</p>
            <p class="p4">Explore the ocean and discover marine life</p>
        </div>
    </header>
    <main>
        <div class="fish-container">
            <h3 class="h33">Discovered Species</h3>
            <button class="button">
                <h5>🔍 Discovered species:</h5>
                <h4 class="number">0</h4>
            </button>
            <br>
            <div class="fish-button">
                <button class="fish"><img src="img/1.jpg" alt="">
                <p>Clownfish</p>
            </button>
            <button class="fish"><img src="img/2.jpg" alt="">
                <p>Octopus</p>
            </button>
            <button class="fish"><img src="img/3.jpg" alt="">
                <p>Jellyfish</p>
            </button>
            <button class="fish"><img src="img/4.jpg" alt="">
                <p>Shark</p>
            </button>
            <button class="fish"><img src="img/5.jpg" alt="">
                <p>Sea Turtle</p>
            </button>
            <button class="fish"><img src="img/6.jpg" alt="">
                <p>Stingray</p>
            </button>
            </div>
        </div>

    </main>
    <script src="main.js"></script>
</body>

</html>
